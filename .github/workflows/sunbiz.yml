name: Sunbiz Daily Import
on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:
jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - env:
          WP_ENDPOINT: ${{ secrets.WP_ENDPOINT }}
          WP_KEY: ${{ secrets.WP_KEY }}
        run: python sunbiz_import.py
