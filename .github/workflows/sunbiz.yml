name: Sunbiz Daily Import
on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"
permissions:
  contents: write
jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python sunbiz_import.py
      - name: Commit data file
        run: |
          git config user.name "sunbiz-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/latest.json
          git commit -m "Update Sunbiz filings $(date -u +%Y-%m-%d)" || echo "No changes"
          git push
